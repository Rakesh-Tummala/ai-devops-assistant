name: Node.js CI/CD

on:
  push:
    branches:
      - main # Trigger on pushes to the 'main' branch
  pull_request:
    branches:
      - main # Trigger on pull requests targeting the 'main' branch
  workflow_dispatch: # Allows manual triggering of the workflow from the GitHub UI

env:
  NODE_VERSION: '20.x' # Specify the Node.js version to use

jobs:
  # --------------------------------------------------------------------------------
  # CI Job: Build, Test, and Lint
  # --------------------------------------------------------------------------------
  build-test-lint:
    name: Build, Test, & Lint
    runs-on: ubuntu-latest # Use the latest Ubuntu runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Action to check out your repository code

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4 # Action to set up Node.js
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm' # Cache npm dependencies for faster builds (can be 'yarn' or 'pnpm')

      - name: Install dependencies
        run: npm ci # 'npm ci' is recommended for CI environments for cleaner installs

      - name: Run lint (if 'lint' script exists)
        # This step will only run if an 'lint' script is defined in your package.json
        # You can remove or modify this if your project doesn't use linting
        run: npm run lint || true # '|| true' allows the workflow to continue if 'lint' script is missing or fails without breaking CI immediately
        continue-on-error: true # Consider changing to 'false' if linting is critical for your project

      - name: Run tests
        # This step assumes you have a 'test' script defined in your package.json
        run: npm test

      - name: Build project (if 'build' script exists)
        # This step will only run if a 'build' script is defined in your package.json
        # Common for frontend projects (React, Vue, Angular) or TypeScript backend projects
        run: npm run build || true # '|| true' allows the workflow to continue if 'build' script is missing or fails without breaking CI immediately
        # If your build step generates artifacts, you might want to upload them:
