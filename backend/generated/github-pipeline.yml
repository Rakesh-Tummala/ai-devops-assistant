```yaml
name: Node.js CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      name: Checkout repository

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm' # Caches node_modules to speed up subsequent runs

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Build project (if applicable)
      # This step is common for many Node.js projects (e.g., frontend apps, TypeScript projects).
      # If your project doesn't have a 'build' script in package.json, you can remove this step.
      run: npm run build
```